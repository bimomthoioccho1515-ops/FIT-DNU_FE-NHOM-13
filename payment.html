<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Payment</title>
<link rel="stylesheet" href="./css/checkout.css">
<script src="./java/payment.js" defer></script>
</head>

<body>
<header class="main-header">
  <a class="logo" href="index.html">FashionHub</a>
  <button class="back" onclick="location.href='checkout.html'">← Back to Checkout</button>
</header>

<section class="checkout payment-page">
  <div class="checkout-header">
    <div class="section-title">
      <span>02</span>
      <div>
        <h1>Payment</h1>
        <p>Confirm your details and complete your order.</p>
      </div>
    </div>
    <div class="steps">
      <div class="step">Shipping</div>
      <div class="step active">Payment</div>
      <div class="step">Complete</div>
    </div>
  </div>

  <div class="payment-grid">
    <div class="payment-left">
      <div class="panel panel-soft">
        <div class="panel-head">
          <div>
            <span class="panel-label">Delivery details</span>
            <h2>Review order</h2>
          </div>
          <div class="panel-meta">Secure payment</div>
        </div>
        <div id="paymentSummary"></div>
      </div>
    </div>

    <aside class="payment-right">
      <div class="panel panel-dark">
        <div class="summary-title">Order summary</div>
        <div class="summary-line">
          <span>Items</span>
          <span id="itemCount">0</span>
        </div>
        <div class="summary-line">
          <span>Delivery</span>
          <span>Free</span>
        </div>
        <div class="summary-total">
          <span>Total</span>
          <strong id="summaryTotal">0₫</strong>
        </div>
        <button onclick="completePayment()">Pay securely</button>
      </div>
    </aside>
  </div>
</section>
</body>

</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FashionHub</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="web.js" defer></script>
</head>

<body>

<div class="top-header">
<div class="top-right">
<a href="#">Help</a>
<a href="#">Join Us</a>

</div>
</div>

<header>

<div class="main-header">

<div class="logo">FashionHub</div>

<nav>
<a onclick="setCategory('all')">All</a>
<a onclick="setCategory('Men')">Men</a>
<a onclick="setCategory('Women')">Women</a>
<a onclick="setCategory('Shoes')">Shoes</a>
<a onclick="setCategory('Accessories')">Accessories</a>
</nav>

<div class="header-right">
<div class="search-box">
<input type="text" id="searchInput" placeholder="Search products...">
</div>
</div>

</div>

</header>

<section class="hero">
<div class="hero-content">
<h1>NEW COLLECTION 2026</h1>
<p>Phong cách thời trang hiện đại</p>
</div>
</section>

<section class="section">

<h2 class="section-title">Sản phẩm nổi bật</h2>

<div class="filter-bar">
<button onclick="setCategory('all')" class="active">Tất cả</button>
<button onclick="setCategory('Men')">Men</button>
<button onclick="setCategory('Women')">Women</button>
<button onclick="setCategory('Shoes')">Shoes</button>
</div>

<div class="products" id="productGrid"></div>

</section>

<div class="color-menu">
<span>Lọc màu:</span>

<button class="color-circle" style="background:black" onclick="setColor('black')"></button>
<button class="color-circle" style="background:white" onclick="setColor('white')"></button>
<button class="color-circle" style="background:blue" onclick="setColor('blue')"></button>
<button class="color-circle" style="background:pink" onclick="setColor('pink')"></button>

</div>

<section class="cart">

<h2>🛒 Giỏ hàng</h2>

<div id="cartItems"></div>

<div class="total">
Tổng tiền:
<span id="total">0₫</span>
</div>

<button class="checkout-btn" onclick="showPayment()">
Thanh toán
</button>

</section>

<div class="payment-modal" id="paymentModal" style="display:none;">

<div class="payment-content">

<h3>Thông tin khách hàng</h3>

<input type="text" placeholder="Họ tên">
<input type="text" placeholder="Số điện thoại">
<input type="text" placeholder="Địa chỉ">

<button class="payment-method">
🚚 Thanh toán COD
</button>

<button class="payment-method">
🏦 Chuyển khoản
</button>

<button class="close-btn" onclick="hidePayment()">
Đóng
</button>

</div>

</div>

<script>

const products = [

{
name:"Nike Air Max",
price:4200000,
category:"Shoes",
color:"black",
image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1000"
},

{
name:"Jordan Retro",
price:5500000,
category:"Shoes",
color:"white",
image:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?q=80&w=1000"
},

{
name:"Pink Hoodie",
price:1200000,
category:"Women",
color:"pink",
image:"https://images.unsplash.com/photo-1521572267360-ee0c2909d518?q=80&w=1000"
}

];

let currentCategory = "all";
let currentColor = "all";

const cart = [];

function renderProducts(){

const grid = document.getElementById("productGrid");

const search = document.getElementById("searchInput").value.toLowerCase();

grid.innerHTML = "";

const filtered = products.filter(p => {

const categoryMatch =
currentCategory === "all" ||
p.category === currentCategory;

const colorMatch =
currentColor === "all" ||
p.color === currentColor;

const searchMatch =
p.name.toLowerCase().includes(search);

return categoryMatch && colorMatch && searchMatch;

});

filtered.forEach(product => {

grid.innerHTML += `

<div class="product-card">

<img src="${product.image}">

<div class="product-info">

<h3>${product.name}</h3>

<p class="price">
${product.price.toLocaleString()}₫
</p>

<button class="buy-btn"
onclick='addToCart(${JSON.stringify(product)})'>
Mua ngay
</button>

</div>

</div>

`;

});

}

function setCategory(category){

currentCategory = category;
renderProducts();

}

function setColor(color){

currentColor = color;
renderProducts();

}

document
.getElementById("searchInput")
.addEventListener("input", renderProducts);

function addToCart(product){

cart.push(product);

renderCart();

}

function renderCart(){

const cartItems =
document.getElementById("cartItems");

cartItems.innerHTML = "";

let total = 0;

cart.forEach(item => {

total += item.price;

cartItems.innerHTML += `

<div class="cart-item">
<span>${item.name}</span>
<span>${item.price.toLocaleString()}₫</span>
</div>

`;

});

document.getElementById("total")
.innerText = total.toLocaleString() + "₫";

}

function showPayment(){

document.getElementById("paymentModal")
.style.display = "flex";

}

function hidePayment(){

document.getElementById("paymentModal")
.style.display = "none";

}

renderProducts();

</script>

</body>
</html>

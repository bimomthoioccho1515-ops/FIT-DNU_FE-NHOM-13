<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FashionHub Admin</title>

<link rel="stylesheet" href="./css/admin.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script defer src="./java/admin.js"></script>

</head>

<body>

<div class="admin-layout">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">
            FASHIONHUB
        </div>

        <nav>

            <a href="#" class="active">
                <i class="fas fa-chart-pie"></i>
                Dashboard
            </a>

            <a href="#inventory">
                <i class="fas fa-box"></i>
                Inventory
            </a>

            <a href="#revenue">
                <i class="fas fa-chart-line"></i>
                Revenue
            </a>

            <a href="#" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                Logout
            </a>

        </nav>

    </aside>

    <!-- MAIN -->

    <main class="admin-main">

        <!-- HEADER -->

        <div class="top-header">

            <div>

                <h1>Dashboard</h1>

                <p>
                    Welcome back, Admin
                </p>

            </div>

            <div class="admin-profile">

                <span>Admin</span>

                <img
                src="https://i.pravatar.cc/100"
                alt="Admin">

            </div>

        </div>

        <!-- STATS -->

        <div class="stats-grid">

            <div class="stat-card">

                <div class="card-icon">
                    💰
                </div>

                <h3>
                    Revenue
                </h3>

                <div
                class="value"
                id="totalRevenue">
                    0₫
                </div>

            </div>

            <div class="stat-card">

                <div class="card-icon">
                    📦
                </div>

                <h3>
                    Inventory
                </h3>

                <div
                class="value"
                id="totalInventory">
                    0
                </div>

            </div>

            <div class="stat-card">

                <div class="card-icon">
                    🛒
                </div>

                <h3>
                    Sold
                </h3>

                <div
                class="value"
                id="totalSold">
                    0
                </div>

            </div>

            <div class="stat-card">

                <div class="card-icon">
                    ⚠️
                </div>

                <h3>
                    Low Stock
                </h3>

                <div
                class="value"
                id="lowStock">
                    0
                </div>

            </div>

        </div>

        <!-- CHARTS -->

        <div
        class="charts-section"
        id="revenue">

            <div class="chart-container">

                <h3>
                    Revenue Analytics
                </h3>

                <canvas id="revenueChart">
                </canvas>

            </div>

            <div class="chart-container">

                <h3>
                    Inventory Analytics
                </h3>

                <canvas id="inventoryChart">
                </canvas>

            </div>

        </div>

        <!-- INVENTORY -->

        <div
        class="inventory-section"
        id="inventory">

            <div class="section-header">

                <h3>
                    Inventory Management
                </h3>

                <div>

                    <button
                    class="add-btn"
                    onclick="openAddModal()">

                        + Add Product

                    </button>

                </div>

            </div>

            <table
            class="inventory-table">

                <thead>

                    <tr>

                        <th>Image</th>

                        <th>Name</th>

                        <th>Category</th>

                        <th>Price</th>

                        <th>Stock</th>

                        <th>Sold</th>

                        <th>Imported</th>

                        <th>Status</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody
                id="inventoryBody">

                </tbody>

            </table>

        </div>

    </main>

</div>

<!-- ADD PRODUCT MODAL -->

<div
id="addModal"
class="modal">

    <div class="modal-content">

        <h2>
            Add Product
        </h2>

        <input
        id="name"
        type="text"
        placeholder="Product name">

        <input
        id="price"
        type="number"
        placeholder="Price">

        <input
        id="stock"
        type="number"
        placeholder="Stock quantity">

        <input
        id="category"
        type="text"
        placeholder="Category">

        <input
        id="color"
        type="text"
        placeholder="Color">

        <input
        id="image"
        type="text"
        placeholder="Link ảnh">

        <div class="modal-actions">

            <button
            onclick="addProduct()">

                Save

            </button>

            <button
            onclick="closeAddModal()">

                Cancel

            </button>

        </div>

    </div>

</div>

<!-- IMPORT STOCK MODAL -->

<div
id="importModal"
class="modal">

    <div class="modal-content">

        <h2>
            Import Stock
        </h2>

        <input
        id="importQuantity"
        type="number"
        placeholder="Số lượng nhập">

        <div class="modal-actions">

            <button
            onclick="confirmImport()">

                Save

            </button>

            <button
            onclick="closeImportModal()">

                Cancel

            </button>

        </div>

    </div>

</div>

</body>
</html>

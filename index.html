  <!DOCTYPE html>
  <html lang="vi">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FashionHub</title>
  <link rel="stylesheet" href="./css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="./java/web.js" defer></script>
  </head>
  <body>
<!-- TOP NAVBAR -->

<nav class="top-navbar">

  <a href="#">Find a Store</a>

  <span>|</span>

  <a href="#">Help</a>

  <span>|</span>

  <a href="#" onclick="handleAuthAction()">Login</a>

</nav>

<!-- MAIN HEADER -->

<header class="main-header">
  

  <div class="logo" style="font-family: 'akira', sans-serif; font-size: 28px; font-weight: 700;">
    FashionHub
  </div>

  <div class="header-right">

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search">
    </div>

   <button class="header-icon">
      <span>♡</span>
    </button>
</button>
   <button class="header-icon"
        onclick="window.location.href='cart.html'">
    🛒
</button>
  </div>

</header>
<!-- INFO BAR -->

<div class="info-bar">

    <p>
        FREE SHIP ON COD &nbsp; • &nbsp; 30 DAY FREE RETURN
    </p>

</div>
  <div class="hero">
  <h1 class="welcome" style="font-family: 'akira', sans-serif;">BUILD UP YOUR STYLE</h1>
  <p style="font-family: 'akira', sans-serif;">READY FOR THE SUMMER</p>
  <button class="hero-btn" onclick="setCategory('all')">SHOP NOW</button>
  </div>
  <h1 style="font-family:'lemonmilk';" class="featured">Featured</h1>
  <section class="featured-grid">

    <div class="featured-card">

        <img src="./stuff/featured1.jpg" alt="Featured 1">

        <div class="featured-overlay">

            <h2>NEW SEASON</h2>

            <button>
                SHOP NOW
            </button>

        </div>

    </div>

    <div class="featured-card">

        <img src="./stuff/featured.avif" alt="Featured 2">

        <div class="featured-overlay">

            <h2>URBAN STYLE</h2>

            <button>
                EXPLORE
            </button>

        </div>

    </div>

</section>
  <section class="products">
    <div class="product-controls">
      <div class="categories">
        <button class="category-btn active" data-category="all" onclick="setCategory('all')">Tất cả</button>
        <button class="category-btn" data-category="Quần áo" onclick="setCategory('Quần áo')">Quần áo</button>
        <button class="category-btn" data-category="Túi xách" onclick="setCategory('Túi xách')">Túi xách</button>
        <button class="category-btn" data-category="Giày" onclick="setCategory('Giày')">Giày</button>
        <button class="category-btn" data-category="Phụ kiện" onclick="setCategory('Phụ kiện')">Phụ kiện</button>
      </div>
    </div>

    <div class="slider" id="productGrid"></div>
  </section>

  <div class="color-menu">
    <span>Lọc màu:</span>
    <button class="color-circle active" data-color="all" onclick="setColor('all')" title="Tất cả">Tất cả</button>
    <button class="color-circle" data-color="white" onclick="setColor('white')" style="background:#fff" title="Trắng"></button>
    <button class="color-circle" data-color="black" onclick="setColor('black')" style="background:#111" title="Đen"></button>
    <button class="color-circle" data-color="blue" onclick="setColor('blue')" style="background:#1e90ff" title="Xanh"></button>
    <button class="color-circle" data-color="pink" onclick="setColor('pink')" style="background:#ff5a9b" title="Hồng"></button>
  </div>

  </body>
  </html>

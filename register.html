<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="body">

<form id="registerForm" class="form">
    <h2><i class="fas fa-user-plus"></i> Đăng ký tài khoản</h2>
    <div class="div">
        <label class="label"><i class="fas fa-user"></i> Tài khoản:</label>
        <input type="text" id="username" class="input" placeholder="Nhập tài khoản" required>
    </div>
    <div class="div">
        <label class="label"><i class="fas fa-envelope"></i> Email:</label>
        <input type="email" id="email" class="input" placeholder="Nhập email" required>
    </div>
    <div class="div">
        <label class="label"><i class="fas fa-lock"></i> Mật khẩu:</label>
        <input type="password" id="password" class="input" placeholder="Nhập mật khẩu" required>
    </div>
    <div class="div">
        <label class="label"><i class="fas fa-lock"></i> Xác nhận mật khẩu:</label>
        <input type="password" id="confirmPassword" class="input" placeholder="Xác nhận mật khẩu" required>
    </div>
    <button type="submit" class="button"><i class="fas fa-user-plus"></i> Đăng ký</button>
    <p id="message"></p>
    <div class="login-link">
        <a href="login.html" class="login"><i class="fas fa-sign-in-alt"></i> Đã có tài khoản? Đăng nhập</a>
    </div>
</form>

<script src="register.js"></script>
</body>
</html>

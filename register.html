<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Register
    </title>

    <link rel="stylesheet"
          href="./css/register.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="register-container">

    <!-- LEFT IMAGE -->

    <div class="register-banner">

        <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1200"
             alt="Fashion">

    </div>

    <!-- RIGHT FORM -->

    <div class="register-form-wrapper">

        <div class="brand-logo">

            FASHIONHUB

        </div>

        <h1>
            Create Account
        </h1>

        <p class="subtitle">
            Join the streetwear movement.
        </p>

        <form id="registerForm"
              class="form">

            <div class="input-group">

                <label>
                    Username
                </label>

                <input type="text"
                       id="username"
                       placeholder="Enter username"
                       required>

            </div>

            <div class="input-group">

                <label>
                    Email
                </label>

                <input type="email"
                       id="email"
                       placeholder="Enter email"
                       required>

            </div>

            <div class="input-group">

                <label>
                    Password
                </label>

                <input type="password"
                       id="password"
                       placeholder="Enter password"
                       required>

            </div>

            <div class="input-group">

                <label>
                    Confirm Password
                </label>

                <input type="password"
                       id="confirmPassword"
                       placeholder="Confirm password"
                       required>

            </div>

            <button type="submit"
                    class="register-btn">

                CREATE ACCOUNT

            </button>

            <p id="message"></p>

        </form>

        <div class="login-link">

            Already have an account?

            <a href="login.html">
                Login
            </a>

        </div>

    </div>

</div>

<script src="./java/register.js"></script>

</body>
</html>

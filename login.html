<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="body">

<form id="loginForm" class="form">
    <h2><i class="fas fa-sign-in-alt"></i> Đăng nhập</h2>
    <div class="div">
        <label class="label"><i class="fas fa-user"></i> Tài khoản:</label>
        <input type="text" id="username" class="input" placeholder="Nhập tài khoản" required>
    </div>
    <div class="div">
        <label class="label"><i class="fas fa-lock"></i> Mật khẩu:</label>
        <input type="password" id="password" class="input" placeholder="Nhập mật khẩu" required>
    </div>
    <div class="register-link">
        <a href="register.html" class="register"><i class="fas fa-user-plus"></i> Chưa có tài khoản? Đăng ký</a>
        <br>
        <a href="#" class="forgot"><i class="fas fa-unlock-alt"></i> Quên mật khẩu?</a>
    </div>
    <button type="submit" class="button"><i class="fas fa-arrow-right"></i> Đăng nhập</button>
    <p id="message"></p>
</form>

<script src="web.js"></script>
<script src="login.js"></script>
</body>
</html>
